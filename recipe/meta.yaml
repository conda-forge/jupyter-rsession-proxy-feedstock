{% set name = "jupyter-rsession-proxy" %}
{% set version = "2.5.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 908f45ecce4b1ef012b8222cb8af756c537ae66d915deff04b7e3caedb050de6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install .

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools
  run:
    - jupyter-server-proxy >=3.1
    - python >={{ python_min }}
    - setuptools

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - jupyter_rsession_proxy

about:
  home: https://github.com/jupyterhub/jupyter-rsession-proxy
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Jupyter extension to proxy RStudio's rsession

extra:
  recipe-maintainers:
    - xhochy
